---
layout: default
---

<h1>{{ page.title }}</h1>
{{ content }}

<script>
// Initialize theme from localStorage
if (localStorage.getItem('darkTheme') === 'true') {
    document.body.classList.add('dark-theme');
}
</script>

<div class="post-tags">
  Tags: 
  {% for tag in page.tags %}
    <a href="/">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
  {% endfor %}
</div>
